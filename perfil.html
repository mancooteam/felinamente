<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Felinamente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; margin-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm" style="border-radius: 12px; overflow: hidden;">
                    <div class="bg-accent p-5 text-white text-center" style="background-color: var(--color-principal);">
                        <div class="rounded-circle bg-white text-accent d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px; font-size: 2rem; color: var(--color-principal);">
                            <span id="profile-initial">?</span>
                        </div>
                        <h2 class="font-serif mb-1" id="profile-username">Cargando...</h2>
                        <p class="mb-0 opacity-75" id="profile-role">Usuario</p>
                    </div>
                    <div class="p-4 p-md-5 bg-white">
                        <form id="formPerfil">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-uppercase fw-bold text-muted">Email</label>
                                    <input type="email" name="email" id="edit_email" class="form-control border-0 bg-light" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-uppercase fw-bold text-muted">Teléfono</label>
                                    <input type="text" name="telefono" id="edit_phone" class="form-control border-0 bg-light">
                                </div>
                                <div class="col-12 mb-3">
                                    <label class="form-label small text-uppercase fw-bold text-muted">Lugar de Residencia (Ciudad/Zona)</label>
                                    <input type="text" name="residencia" id="edit_residencia" class="form-control border-0 bg-light">
                                </div>
                                <div class="col-12 mb-4">
                                    <hr class="my-4">
                                    <label class="form-label small text-uppercase fw-bold text-muted">Cambiar Contraseña (dejar vacío para no cambiar)</label>
                                    <input type="password" name="password" class="form-control border-0 bg-light" placeholder="••••••••">
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn-minimal px-5">Guardar Cambios</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
