<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud - Felinamente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px; margin-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="cat-brief" class="mb-4 d-none">
                    <div class="d-flex align-items-center p-3 bg-white border rounded shadow-sm">
                        <img id="brief-img" src="" alt="" style="width: 80px; height: 80px; object-fit: cover; border-radius: 4px;">
                        <div class="ms-3">
                            <h4 class="font-serif mb-1" id="brief-name">Gato</h4>
                            <p class="text-muted mb-0" id="brief-text">Cargando detalles...</p>
                        </div>
                    </div>
                </div>

                <h2 class="section-title mb-4" id="titulo-pagina-solicitud">Formulario de Solicitud</h2>
                
                <div class="card card-editorial border" style="background: white; padding: 2rem; border-color: var(--color-border) !important;">
                    <form id="formSolicitud">
                        <input type="hidden" id="solicitud_id_gato" name="id_gato">
                        <input type="hidden" id="solicitud_tipo" name="tipo">
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Nombre</label>
                                <input type="text" class="form-control" name="nombre" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Apellidos</label>
                                <input type="text" class="form-control" name="apellidos" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Localidad / Ciudad</label>
                                <input type="text" class="form-control" name="localidad" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Tipo de vivienda</label>
                                <select class="form-select" name="vivienda" required>
                                    <option value="" disabled selected>Selecciona una opción...</option>
                                    <option value="Piso con balcón/terraza">Piso con balcón/terraza</option>
                                    <option value="Piso sin balcón">Piso sin balcón</option>
                                    <option value="Casa con jardín">Casa con jardín</option>
                                    <option value="Chalet/Finca">Chalet / Finca</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Personas que conviven en el hogar</label>
                                <input type="number" class="form-control" name="convivientes" min="1" value="1" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium text-muted">Otras mascotas en casa</label>
                                <input type="text" class="form-control" name="mascotas" placeholder="Ej: 1 perro, 2 gatos, o Ninguna" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-muted">¿Por qué quieres adoptar/acoger a este felino?</label>
                            <textarea class="form-control" name="mensaje" rows="4" required></textarea>
                        </div>

                        <button type="submit" class="btn-minimal w-100">Enviar Solicitud</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-minimal w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-outline-minimal w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/solicitud.js"></script>
</body>
</html>
