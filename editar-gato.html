<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Felino - Felinamente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px; margin-bottom: 80px;">
        <div class="mb-4">
            <a href="gestion.html" class="link-editorial">← Volver a Gestión</a>
        </div>
        <h2 class="section-title mb-4">Editar Felino</h2>

        <div class="card card-editorial border"
            style="background: var(--color-superficie); padding: 2rem; border-color: var(--color-borde) !important;">
            <form id="formEditarGato">
                <input type="hidden" name="id" id="edit_id">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Nombre del felino</label>
                        <input type="text" name="name" id="edit_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Estado</label>
                        <select name="status" id="edit_status" class="form-select">
                            <option value="disponible">Disponible</option>
                            <option value="acogido">En Acogida</option>
                            <option value="reservado">Reservado / Adoptado</option>
                            <option value="enfermo">Enfermo / Tratamiento</option>
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="birth_date" id="edit_birth" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Sexo</label>
                        <select name="gender" id="edit_gender" class="form-select">
                            <option value="macho">Macho</option>
                            <option value="hembra">Hembra</option>
                            <option value="desconocido">Desconocido</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label>Descripción</label>
                    <textarea name="description" id="edit_desc" class="form-control" rows="3"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Imagen Principal</label>
                        <input type="file" name="image_file" id="edit_img_file" class="form-control" accept="image/*">
                        <small class="text-muted">Si no seleccionas un archivo, se mantendrá la imagen actual.</small>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Añadir a la Galería (Múltiples)</label>
                        <input type="file" name="gallery_files[]" id="edit_gallery_files" class="form-control"
                            accept="image/*" multiple>
                        <small class="text-muted">Puedes seleccionar varias fotos a la vez.</small>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Notas Médicas / Panel de Salud</label>
                    <textarea name="notas_medicas" id="edit_notas" class="form-control" rows="4"
                        placeholder="Detalles sobre vacunas, enfermedades, etc."></textarea>
                </div>
                <div class="form-check form-switch mb-4">
                    <input class="form-check-input" type="checkbox" name="vhif_positive" id="edit_vhif">
                    <label class="form-check-label text-accent fw-bold" for="edit_vhif">Positivo en VHIF (Sida
                        Felino)</label>
                </div>
                <button type="submit" class="btn-minimal w-100">Guardar Cambios</button>
            </form>
            <div id="loading-edit" class="text-center py-5 d-none">
                <div class="spinner-border text-secondary"></div>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-minimal w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn-outline-minimal w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5 pt-5 pb-3 border-top text-center">
        <p class="small text-muted">&copy; 2026 Felinamente. Karolina Maria Bodziony, 2 DAW.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/editar-gato.js"></script>
</body>

</html>
