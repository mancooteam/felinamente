<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión - Felinamente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body class="bg-light">

    <!-- Navegación Común -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <div class="container" id="gestion-content" style="margin-top: 100px; margin-bottom: 80px;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="section-title mb-0">Panel de Gestión</h2>
            <button class="btn-minimal" data-bs-toggle="modal" data-bs-target="#modalGato">
                + Nuevo Felino
            </button>
        </div>
        
        <div class="row mb-5">
            <div class="col-md-3">
                <div class="card card-editorial border p-4 mb-4" style="background: white;">
                    <h5 class="font-serif mb-4">Accesos rápidos</h5>
                    <a href="solicitudes.html" class="link-editorial d-block mb-3">Gestionar Solicitudes</a>
                    <a href="usuarios.html" class="link-editorial d-block mb-3" id="link-usuarios-admin">Gestión de Usuarios</a>
                    <a href="index.html" class="link-editorial d-block">Volver a la Web</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-editorial p-4 border" style="background: white; border-color: var(--color-border) !important;">
                    <h5 class="text-muted fw-bold mb-2">Solicitudes Pendientes</h5>
                    <div class="d-flex align-items-center">
                        <span id="pending-requests-count" class="font-serif text-accent" style="font-size: 3rem; line-height: 1;">-</span>
                        <div class="ms-3">
                            <span class="d-block text-muted">esperando revisión</span>
                            <a href="solicitudes.html" class="link-editorial small">Ver todas las solicitudes</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Miniatura</th>
                        <th>Nombre</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-gestion-gatos">
                    <tr><td colspan="4" class="text-center">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Añadir/Editar Gato -->
    <div class="modal fade" id="modalGato" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Añadir Nuevo Felino</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formGato">
                        <input type="hidden" name="id_gato" id="gato_id">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Nombre del felino</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Imagen del felino</label>
                                <input type="file" name="imagen" class="form-control" accept="image/*" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Fecha de Nacimiento</label>
                                <input type="date" name="birth_date" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Sexo</label>
                                <select name="gender" class="form-select">
                                    <option value="macho">Macho</option>
                                    <option value="hembra">Hembra</option>
                                    <option value="desconocido">Desconocido</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Estado inicial</label>
                                <select name="status" class="form-select">
                                    <option value="disponible">Disponible</option>
                                    <option value="acogido">En Acogida</option>
                                    <option value="reservado">Reservado / Adoptado</option>
                                    <option value="enfermo">Enfermo / Tratamiento</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Descripción</label>
                                <textarea name="description" class="form-control" rows="1"></textarea>
                            </div>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" name="vhif_positive" id="vhif_check">
                            <label class="form-check-label text-danger fw-bold" for="vhif_check">Positivo en VHIF (Sida Felino)</label>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Guardar Felino</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Login -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/gestion.js"></script>
</body>
</html>
