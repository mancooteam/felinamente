<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Felinamente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 100px; margin-bottom: 80px;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h2 class="font-serif m-0">Gestión de Usuarios</h2>
            <div class="d-flex gap-2">
                <button class="btn-minimal" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario">+ Nuevo
                    Usuario</button>
                <a href="gestion.html" class="btn-outline-minimal">Volver al Panel</a>
            </div>
        </div>

        <!-- Modal Nuevo Usuario -->
        <div class="modal fade" id="modalNuevoUsuario" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content border-0">
                    <div class="modal-header border-0">
                        <h5 class="modal-title font-serif">Añadir Nuevo Usuario</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="formNuevoUsuario">
                            <div class="mb-3">
                                <label class="form-label small text-uppercase fw-bold">Nombre de Usuario</label>
                                <input type="text" name="username" class="form-control border-0 bg-light" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-uppercase fw-bold">Email</label>
                                <input type="email" name="email" class="form-control border-0 bg-light" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-uppercase fw-bold">Contraseña</label>
                                <input type="password" name="password" class="form-control border-0 bg-light" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small text-uppercase fw-bold">Rol Inicial</label>
                                <select name="rol" class="form-select border-0 bg-light">
                                    <option value="user">Usuario (Adoptante)</option>
                                    <option value="volunteer">Voluntario</option>
                                    <option value="employee">Empleado / Staff</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-minimal w-100">Crear Usuario</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 12px;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-white">
                        <tr>
                            <th class="px-4 py-3 border-0">Usuario</th>
                            <th class="py-3 border-0">Email</th>
                            <th class="py-3 border-0">Rol</th>
                            <th class="py-3 border-0 text-end px-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-usuarios" class="border-top">
                        <!-- Cargado por JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Editar Usuario -->
    <div class="modal fade" id="modalEditarUsuario" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title font-serif">Editar Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditUser">
                        <input type="hidden" name="id_usuario" id="edit_user_id">
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold">Nombre de Usuario</label>
                            <input type="text" name="nombre_usuario" id="edit_user_name"
                                class="form-control border-0 bg-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold">Rol</label>
                            <select name="rol" id="edit_user_role" class="form-select">
                                <option value="user">Usuario (Adoptante)</option>
                                <option value="volunteer">Voluntario</option>
                                <option value="employee">Empleado / Staff</option>
                                <option value="admin">Administrador</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Nueva Contraseña (dejar vacío para no cambiar)</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-minimal w-100">Guardar Cambios</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5 pt-5 pb-3 border-top text-center">
        <p class="small text-muted">&copy; 2026 Felinamente. Karolina Maria Bodziony, 2 DAW.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/usuarios-admin.js"></script>
</body>

</html>
