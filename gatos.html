<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Felinos - Felinamente</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Archivo CSS personalizado -->
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image/png" href="felinamente_favicon_cat_1778509684056.png">
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Felinamente.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav me-auto" id="nav-links"></div>
                <div class="d-flex align-items-center" id="nav-auth"></div>
            </div>
        </div>
    </nav>

    <!-- Hero del Catálogo -->
    <section class="catalog-hero"
        style="margin-top: 80px; padding: 100px 0 60px 0; background: var(--color-bg); border-bottom: 1px solid var(--color-borde);">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-7">
                    <h1 class="display-3 font-serif mb-4" style="letter-spacing: -2px;">Nuestros felinos</h1>
                    <p class="lead text-muted mb-5" style="max-width: 600px;">
                        Cada uno de nuestros gatos tiene una historia de superación. Filtra por sus necesidades y
                        encuentra a tu compañero ideal hoy mismo.
                    </p>
                </div>
                <div class="col-lg-5">
                    <div class="p-4 border rounded shadow-sm bg-white">
                        <h5 class="font-serif mb-3">Encuentra a tu compañero ideal</h5>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold text-muted">VHIF (Sida Felino)</label>
                            <select id="filtro-vhif" class="form-select border-0 bg-light" onchange="obtenerGatos()">
                                <option value="">Todos</option>
                                <option value="1">Positivo</option>
                                <option value="0">Negativo</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold text-muted">Género</label>
                            <select id="filtro-genero" class="form-select border-0 bg-light" onchange="obtenerGatos()">
                                <option value="">Todos</option>
                                <option value="macho">Macho</option>
                                <option value="hembra">Hembra</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold text-muted">Edad</label>
                            <select id="filtro-edad" class="form-select border-0 bg-light" onchange="obtenerGatos()">
                                <option value="">Todas</option>
                                <option value="cachorro">Cachorro (< 1 año)</option>
                                <option value="joven">Joven (1-3 años)</option>
                                <option value="adulto">Adulto (3-7 años)</option>
                                <option value="senior">Senior (+7 años)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-uppercase fw-bold text-muted">Ordenar por</label>
                            <select id="filtro-orden" class="form-select border-0 bg-light" onchange="obtenerGatos()">
                                <option value="recientes">Más recientes</option>
                                <option value="antiguos">Más antiguos</option>
                                <option value="nombre_asc">Nombre (A-Z)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="container my-5 pb-5">
        <div id="lista-gatos" class="row">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-secondary opacity-25" style="width: 3rem; height: 3rem;"></div>
            </div>
        </div>
    </div>

    <!-- Modales de Autenticación (Deberían estar en todos los HTML para que funcionen) -->
    <!-- Modal Login -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Iniciar Sesión</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Registro -->
    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registrarse</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label>Usuario</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Crear cuenta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/gatos.js"></script>
</body>

</html>
